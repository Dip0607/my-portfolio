baseURL: "https://dipankarnath.databrain.workers.dev/"
languageCode: en-us
defaultContentLanguage: en
title: "Dipankar Nath"
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false

params:
  # Nice default: dark theme, wide content, reading time, Toc
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  ShowPostNavLinks: true
  hideFooter: false

  # ----- Profile-mode home page: centered hero + buttons (looks great) -----
  profileMode:
    enabled: true
    title: "Dipankar Nath"
    subtitle: >
      Data Scientist with 3+ years building machine-learning, LLM, and
      Generative-AI solutions across finance, supply chain, and tech.
    buttons:
      - name: Resume
        url: /resume/
      - name: Blog
        url: /posts/

  socialIcons:
    - name: github
      url: "https://github.com/Dip0607"
    - name: linkedin
      url: "https://www.linkedin.com/in/dipankarnath67/"
    - name: email
      url: "mailto:dipankar2149@gmail.com"

menu:
  main:
    - identifier: blog
      name: Blog
      url: /posts/
      weight: 10
    - identifier: resume
      name: Resume
      url: /resume/
      weight: 20

# Needed so raw HTML / SVG diagrams render inside blog posts
markup:
  goldmark:
    renderer:
      unsafe: true
